services:
  mongo:
    image: mongo:7
    container_name: forbes_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: editor
      MONGO_INITDB_ROOT_PASSWORD: headline1917
      MONGO_INITDB_DATABASE: forbes_cms
    ports:
      - "27017:27017"
    volumes:
      - forbes_data:/data/db
      - ./init:/docker-entrypoint-initdb.d

  mongo-express:
    image: mongo-express:1.0.2
    container_name: forbes_mongo_express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: editor
      ME_CONFIG_MONGODB_ADMINPASSWORD: headline1917
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"
    depends_on:
      - mongo

volumes:
  forbes_data:
